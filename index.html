<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>F3 Photo Gallery</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <h1 class="site-title">資通科中三級數碼攝影及修圖單元</h1>
      <p class="site-subtitle">優秀作品</p>
    </div>
  </header>

  <main class="site-main">
    <section class="gallery-section">
      <h2 class="section-title">相片一覽</h2>
      <div id="gallery" class="gallery-grid" aria-label="Photo gallery"></div>
    </section>
  </main>

  <div id="lightbox" class="lightbox" aria-hidden="true">
    <div class="lightbox-backdrop" data-lightbox-close></div>
    <div class="lightbox-content" role="dialog" aria-modal="true" aria-label="Photo viewer">
      <button class="lightbox-close" type="button" aria-label="關閉" data-lightbox-close>&times;</button>
      <button class="lightbox-nav lightbox-prev" type="button" aria-label="上一張" data-lightbox-prev>&#10094;</button>
      <img id="lightbox-image" class="lightbox-image" src="" alt="" />
      <button class="lightbox-nav lightbox-next" type="button" aria-label="下一張" data-lightbox-next>&#10095;</button>
      <div class="lightbox-caption">
        <span id="lightbox-caption-text"></span>
        <span id="lightbox-counter" class="lightbox-counter"></span>
      </div>
    </div>
  </div>

  <script src="app.js" defer></script>
</body>
</html>
